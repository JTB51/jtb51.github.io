<!DOCTYPE html>
<html>
  <head>
    <title>Jeff's Website</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="Images/can" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      .music-player {
        text-align: center;
        margin: 20px;
      }

      #albumArt {
        width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        display: block;
        margin: 10px auto;
      }

      #trackTitle {
        font-weight: bold;
        margin: -5px;
        font-family: sans-serif;
      }

      button {
        margin: 10px 5px 5px 5px;
        padding: 10px;
        font-size: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.3s;
      }

      .genre-container {
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid #eee;
      }

      .genre-btn {
        background-color: #f8f9fa;
        border: 1px solid #ddd;
        font-weight: bold;
        min-width: 80px;
      }

      .genre-btn:hover {
        background-color: #e2e6ea;
      }

      .active-genre {
        background-color: #007bff !important;
        color: white;
        border-color: #0056b3;
      }

      .volume-container {
        margin-top: 8px;
      }

      #volumeSlider {
        width: 220px;
        cursor: pointer;
      }

      /* Song List Box */
      .song-list-container {
        margin-top: 20px;
        background: white;
        border-radius: 12px;
        padding: 10px;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: left;
      }

      .song-item {
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
        font-family: sans-serif;
        font-size: 14px;
      }

      .song-item:hover {
        background-color: #f1f1f1;
      }

      .active-song {
        background-color: #007bff;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="all-contents"> 
      <nav>
         <h1>Jeff's Amazing Website</h1> 
         <ul id="nav-ul"> 
          <li class="nav-li">
            <a href="index.html">Home</a>
          </li> <li class="nav-li">
            <a href="portfolio.html">Portfolio</a>
          </li> 
          <li class="nav-li">
            <a href="about_me.html">Bio</a>
          </li> 
          <li class="nav-li">
            <a href="music.html">Music</a>
          </li> 
        </ul> 
      </nav>
    <div class="music-player">
      <h2 id = "title">Music Player</h2>
      <audio id="audioPlayer"></audio>

      <img id="albumArt" />
      <p id="trackTitle"></p>

      <div class="main-controls">
        <button id="prevBtn">◁</button>
        <button id="playPauseBtn">▶︎</button>
        <button id="nextBtn">▷</button>
      </div>

      <div class="volume-container">
        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>

      <div class="genre-container">
        <button class="genre-btn" id="edmBtn" onclick="changePlaylist('edm')">
          EDM
        </button>
        <button class="genre-btn" id="rapBtn" onclick="changePlaylist('rap')">
          Rap
        </button>
        <button class="genre-btn" id="popBtn" onclick="changePlaylist('pop')">
          Pop
        </button>
      </div>

      <div class="song-list-container" id="songList"></div>
    </div>

    <script>
      const audio = document.getElementById("audioPlayer");
      const prevBtn = document.getElementById("prevBtn");
      const playPauseBtn = document.getElementById("playPauseBtn");
      const nextBtn = document.getElementById("nextBtn");
      const albumArt = document.getElementById("albumArt");
      const trackTitle = document.getElementById("trackTitle");
      const volumeSlider = document.getElementById("volumeSlider");
      const songList = document.getElementById("songList");

      const playlists = {
        edm: [
          {
            title: "Nevada - Vicetone",
            src: "mp3/Vicetone - Nevada (ft. Cozi Zuehlsdorff).mp3",
            img: "album/nevada.jpg",
          },
          {
            title: "Shine - Spektrem",
            src: "mp3/Spektrem - Shine Progressive House NCS.mp3",
            img: "album/ncs.jpg",
          },
          {
            title: "Heroes Tonight - Janji",
            src: "mp3/Janji - Heroes Tonight.mp3",
            img: "album/heroestonight.jpg",
          },
        ],
        rap: [
          {
            title: "Two Tone - TheKidSZN",
            src: "mp3/THEKIDSZN - TWOTONE.mp3",
            img: "album/twotone.jpg",
          },
          {
            title: "I'll Be Fine - JuiceWRLD",
            src: "mp3/Juice WRLD - I'll Be Fine.mp3",
            img: "album/gbgr.jpg",
          },
        ],
        pop: [
          {
            title: "Hell & Back - Kid Ink",
            src: "mp3/Hell & Back.mp3",
            img: "album/hellandback.jpg",
          },
          { title: "Dreaming - Smallpools", src: "mp3/Dreaming.mp3", img: "album/dreaming.jpg" },
          { title: "Appalachia - glaive", src: "mp3/Appalachia.mp3", img: "album/yall.jpg" },
          { title: "Crying, Laughing, Loving, Lying - glaive", src: "mp3/Crying, Laughing, Loving, Lying.mp3", img: "album/yall.jpg" },
          { title: "Foreigner - glaive", src: "mp3/Foreigner.mp3", img: "album/yall.jpg" },
          { title: "i love you and it sounds stupid - glaive", src: "mp3/i love you and it sounds stupid.mp3", img: "album/yall.jpg" },
          { title: "It Is What It Is - glaive", src: "mp3/It Is What It Is.mp3", img: "album/yall.jpg" },
          { title: "Modafinil - glaive", src: "mp3/Modafinil.mp3", img: "album/yall.jpg" },
          { title: "Nouveau Riche - glaive", src: "mp3/Nouveau Riche.mp3", img: "album/yall.jpg" },
          { title: "Veni Vidi Vici - glaive", src: "mp3/Veni Vidi Vici.mp3", img: "album/yall.jpg" },
          { title: "We Don't Leave the House - glaive", src: "mp3/We Don't Leave the House.mp3", img: "album/yall.jpg" },
        ],
      };

      const genreOrder = ["edm", "rap", "pop"];
      let currentGenreIndex = 0;
      let currentTrackIndex = 0;

      function renderSongList() {
        const genre = genreOrder[currentGenreIndex];
        songList.innerHTML = "";

        playlists[genre].forEach((track, index) => {
          const div = document.createElement("div");
          div.classList.add("song-item");
          div.textContent = track.title;

          if (index === currentTrackIndex) {
            div.classList.add("active-song");
          }

          div.addEventListener("click", () => {
            currentTrackIndex = index;
            loadTrack(currentGenreIndex, currentTrackIndex);
          });

          songList.appendChild(div);
        });
      }

      function loadTrack(gIdx, tIdx, shouldPlay = true) {
        const genre = genreOrder[gIdx];
        const track = playlists[genre][tIdx];

        audio.src = track.src;
        albumArt.src = track.img;
        trackTitle.textContent = track.title;

        // Update active genre button
        document.querySelectorAll(".genre-btn").forEach((btn) =>
          btn.classList.remove("active-genre")
        );
        document.getElementById(genre + "Btn").classList.add("active-genre");

        renderSongList();

        if (shouldPlay) {
          audio.play();
          playPauseBtn.textContent = "❚❚";
        }
      }

      function changePlaylist(name) {
        currentGenreIndex = genreOrder.indexOf(name);
        currentTrackIndex = 0;
        loadTrack(currentGenreIndex, currentTrackIndex);
      }

      playPauseBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play();
          playPauseBtn.textContent = "❚❚";
        } else {
          audio.pause();
          playPauseBtn.textContent = "▶︎";
        }
      });

      nextBtn.addEventListener("click", () => {
        currentTrackIndex++;
        if (
          currentTrackIndex >=
          playlists[genreOrder[currentGenreIndex]].length
        ) {
          currentTrackIndex = 0;
          currentGenreIndex = (currentGenreIndex + 1) % genreOrder.length;
        }
        loadTrack(currentGenreIndex, currentTrackIndex);
      });

      prevBtn.addEventListener("click", () => {
        currentTrackIndex--;
        if (currentTrackIndex < 0) {
          currentGenreIndex =
            (currentGenreIndex - 1 + genreOrder.length) % genreOrder.length;
          currentTrackIndex =
            playlists[genreOrder[currentGenreIndex]].length - 1;
        }
        loadTrack(currentGenreIndex, currentTrackIndex);
      });

      volumeSlider.addEventListener("input", () => {
        audio.volume = volumeSlider.value;
      });

      audio.addEventListener("ended", () => {
        nextBtn.click();
      });

      loadTrack(currentGenreIndex, currentTrackIndex, false);
    </script>
  </body>
</html>
