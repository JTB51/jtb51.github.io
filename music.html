<!DOCTYPE html>
<html>
  <head>
    <title>Jeff's Website</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="Images/can" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        color: white;
      }

      button {
        margin: 10px 5px 5px 5px;
        padding: 10px;
        font-size: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.3s;
      }

      #trackTitle {
        color: white;
        font-size: 20px;
      }

      .music-player {
          color: black; 
      }

      #prevBtn {
          width: 100px;
      }

      #nextBtn {
          width: 100px;
      }

      #playPauseBtn {
          width: 100px;
      }

      #title {
          color: white;
          font-size: 30px;
      }

      .music-player {
              text-align: center;
              margin: 20px;
            }

      #albumArt {
          width: 250px;
          height: 250px;
          object-fit: cover;
          border-radius: 15px;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
          display: block;
          margin: 10px auto;
            }

      #trackTitle {
          font-weight: bold;
          margin: -5px;
          font-family: sans-serif;
            }

      .genre-container {
          margin-top: 15px;
          padding-top: 10px;
          border-top: 1px solid #eee;
              }

      .genre-btn {
          background-color: #f8f9fa;
          border: 1px solid #ddd;
          font-weight: bold;
          min-width: 80px;
              }

      .genre-btn:hover {
          background-color: #e2e6ea;
              }

      .active-genre {
          background-color: #007bff !important;
          color: white;
          border-color: #0056b3;
              }

      /* Controls container: progress + main controls + volume */
      .controls-container {
          display: flex;
          justify-content: center;
          align-items: flex-end;
          gap: 20px;
          margin-top: 15px;
          }

      .progress-container, .volume-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          }

      .progress-container label, .volume-container label {
          color: white;
          font-size: 16px;
          margin-bottom: 6px; /* slightly above the bar */
          }

      #timeDisplay {
          font-size: 16px;
          color: white;
          margin-bottom: 6px; /* slightly above the bar */
          font-family: sans-serif;
          }

      #progressBar, #volumeSlider {
          width: 150px;
          height: 10px;
          cursor: pointer;
          -webkit-appearance: none;
          border-radius: 5px;
          background: linear-gradient(to right, #007bff 0%, #007bff 0%, #555 0%, #555 100%);
          }

      #progressBar::-webkit-slider-thumb, #volumeSlider::-webkit-slider-thumb {
          -webkit-appearance: none;
          width: 16px;
          height: 16px;
          background: #fff;
          border-radius: 50%;
          cursor: pointer;
          margin-top: -3px;
          }

      #progressBar::-moz-range-thumb, #volumeSlider::-moz-range-thumb {
          width: 16px;
          height: 16px;
          background: #fff;
          border-radius: 50%;
          cursor: pointer;
          }

      /* Song List Box */
      .song-list-container {
          margin-top: 20px;
          background: white;
          border-radius: 12px;
          padding: 10px;
          max-width: 400px;
          margin-left: auto;
          margin-right: auto;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
          text-align: left;
          }

      .song-item {
          padding: 8px;
          border-radius: 8px;
          cursor: pointer;
          transition: background 0.2s;
          font-family: sans-serif;
          font-size: 14px;
          color: black;
      }

      .song-item:hover {
          background-color: #f1f1f1;
      }

      .active-song {
          background-color: #007bff;
          color: white;
      }

      .song-item.active-song:hover {
          background-color: #007bff;
          color: white;
      }

      #volumeText {
          font-size: 20px;  /* bigger font */
          color: white;
          margin-bottom: 6px;
      }

    </style>
  </head>

  <body>
    <div id="all-contents">
      <nav>
        <h1>Jeff's Amazing Website</h1>
        <ul id="nav-ul">
          <li class="nav-li"><a href="index.html"> Home </a></li>
          <li class="nav-li"><a href="portfolio.html"> Portfolio </a></li>
          <li class="nav-li"><a href="about_me.html"> Bio </a></li>
        </ul>
      </nav>

      <div class="music-player">
        <h2 id="title"> Music Player </h2>
        <audio id="audioPlayer"></audio>

        <img id="albumArt" />
        <p id="trackTitle"></p>

        <!-- Controls with progress and volume -->
        <div class="controls-container">
          <div class="progress-container">
            <div id="timeDisplay">0:00 / 0:00</div>
            <input type="range" id="progressBar" min="0" max="100" step="0.1" value="0" />
          </div>

          <div class="main-controls">
            <button id="prevBtn">◁</button>
            <button id="playPauseBtn">▶︎</button>
            <button id="nextBtn">▷</button>
          </div>

          <div class="volume-container">
            <label id = "volumeText"> Volume </label>
            <input type="range" id="volumeSlider" min="0" max="100" step="1" value="50" />
          </div>
        </div>

        <div class="genre-container">
          <button class="genre-btn" id="edmBtn" onclick="changePlaylist('edm')">EDM</button>
          <button class="genre-btn" id="rapBtn" onclick="changePlaylist('rap')">Rap</button>
          <button class="genre-btn" id="popBtn" onclick="changePlaylist('pop')">Pop</button>
          <button class="genre-btn" id="rockBtn" onclick="changePlaylist('rock')">Rock</button>
        </div>

        <div class="song-list-container" id="songList"></div>
      </div>
    </div>

    <script>
      const audio = document.getElementById("audioPlayer");
      const prevBtn = document.getElementById("prevBtn");
      const playPauseBtn = document.getElementById("playPauseBtn");
      const nextBtn = document.getElementById("nextBtn");
      const albumArt = document.getElementById("albumArt");
      const trackTitle = document.getElementById("trackTitle");
      const volumeSlider = document.getElementById("volumeSlider");
      const songList = document.getElementById("songList");
      const progressBar = document.getElementById("progressBar");
      const timeDisplay = document.getElementById("timeDisplay");

      const playlists = {
        edm: [
          { title: "Nevada - Vicetone", src: "mp3/Nevada.mp3", img: "album/nevada.jpg" },
          { title: "Animals - Martin Garrix", src: "mp3/Animals.mp3", img: "album/animals.jpg"},
          { title: "Shine - Spektrem", src: "mp3/Shine.mp3", img: "album/ncs.jpg" },
          { title: "Heroes Tonight - Janji", src: "mp3/HT.mp3", img: "album/heroestonight.jpg" },
          { title: "Grateful - Neffex", src: "mp3/Grateful.mp3", img: "album/grateful.jpg"},
          { title: "Dreams II - Lost Sky (Feat. Sarah Skinner)", src: "mp3/Dreams.mp3", img: "album/dreams.jpg"},


        ],
        rap: [
          { title: "Two Tone - TheKidSZN", src: "mp3/TwoTone.mp3", img: "album/twotone.jpg" },
          { title: "I'll Be Fine - JuiceWRLD", src: "mp3/IBF.mp3", img: "album/gbgr.jpg" },
          { title: "Used To - JuiceWRLD", src: "mp3/UT.mp3", img: "album/gbgr.jpg"},
          { title: "Rockstar - Post Malone (feat. 21 Savage)", src: "mp3/rockstar.mp3", img: "album/bbab.jpg"},
          { title: "Ruthless - Lil Tjay (feat. Jay Critch)", src: "mp3/Ruthless.mp3", img: "album/ruthless.jpg"},
          { title: "Do What I Want - Lil Uzi Vert", src: "mp3/DWIW.mp3", img: "album/myron.jpg"},
          { title: "16 - thekidszn", src: "mp3/16.mp3", img: "album/elevated.jpg"},
          { title: "Power Trip - J. Cole (feat. Miguel)", src: "mp3/PT.mp3", img: "album/jcole.jpg"},
          { title: "Who? What? - Travis Scott", src: "mp3/WW.mp3", img: "album/astroworld.jpg"},
          { title: "Gang - Badda TD", src: "mp3/gang.mp3", img: "album/gang.jpg"},
          { title: "COMË N GO - Yeat", src: "mp3/CnG.mp3", img: "album/dangeroussummer.jpg"},
          { title: "NBAYoungBoat - Lil Yachty (feat. NBA Youngboy)", src: "mp3/NBAYB.mp3", img: "album/nabyb.jpg"},
          { title: "Stuck In A Dream - Lil Mosey (feat. Gunna)", src: "mp3/SIAD.mp3", img: "album/siad.jpg"},
          { title: "Sanguine Paradise - Lil Uzi Vert", src: "mp3/SP.mp3", img: "album/sp.jpg"},
          { title: "That Way - Lil Uzi Vert", src: "mp3/TW.mp3", img: "album/tw.jpg"},
        ],
        pop: [
          { title: "Hell & Back - Kid Ink", src: "mp3/H&B.mp3", img: "album/hellandback.jpg" },
          { title: "Dreaming - Smallpools", src: "mp3/Dreaming.mp3", img: "album/dreaming.jpg" },
          { title: "Appalachia - glaive", src: "mp3/Appalachia.mp3", img: "album/yall.jpg" },
          { title: "Crying, Laughing, Loving, Lying - glaive", src: "mp3/CLLL.mp3", img: "album/yall.jpg" },
          { title: "Foreigner - glaive", src: "mp3/Foreigner.mp3", img: "album/yall.jpg" },
          { title: "i love you and it sounds stupid - glaive", src: "mp3/ILY.mp3", img: "album/yall.jpg" },
          { title: "It Is What It Is - glaive", src: "mp3/IIWII.mp3", img: "album/yall.jpg" },
          { title: "Modafinil - glaive", src: "mp3/Modafinil.mp3", img: "album/yall.jpg" },
          { title: "Nouveau Riche - glaive", src: "mp3/NR.mp3", img: "album/yall.jpg" },
          { title: "Veni Vidi Vici - glaive", src: "mp3/VVV.mp3", img: "album/yall.jpg" },
          { title: "We Don't Leave the House - glaive", src: "mp3/WDLTH.mp3", img: "album/yall.jpg" },
          { title: "Ride - twenty one pilots", src: "mp3/Ride.mp3", img: "album/blurryface.jpg"},
          { title: "Message Man - twenty one pilots", src: "mp3/MM.mp3", img: "album/blurryface.jpg"},
          { title: "Now Or Never - Halsey", src: "mp3/NON.mp3", img: "album/hopelessfountainkingdom.jpg"},
          { title: "Sick Boy - The Chainsmokers", src: "mp3/SB.mp3", img: "album/sickboy.jpg"},
          { title: "No Angels - Bastille (Feat. Ella Eyre)", src: "mp3/NA.mp3", img: "album/noangels.jpg"},
          { title: "Sail - Awolnation", src: "mp3/Sail.mp3", img: "album/sail.jpg"},

        ],
        rock: [
          { title: "I Ran (So Far Away) - Flock of Seagulls", src: "mp3/IR.mp3", img: "album/iran.jpg"},
          { title: "It's Not My Time - 3 Doors Down", src: "mp3/INMT.mp3", img: "album/3dd.jpg"},
          { title: "I Hate Everything About You - Three Days Grace", src: "mp3/IHEAY.mp3", img: "album/3dg.jpg"},
          { title: "Second Chance - Shinedown", src: "mp3/SC.mp3", img: "album/soundofmadness.jpg"},
        ]
      };

      const genreOrder = ["edm", "rap", "pop", "rock"];
      let currentGenreIndex = 0;
      let currentTrackIndex = 0;

      function renderSongList() {
        const genre = genreOrder[currentGenreIndex];
        songList.innerHTML = "";
        playlists[genre].forEach((track, index) => {
          const div = document.createElement("div");
          div.classList.add("song-item");
          div.textContent = track.title;
          if (index === currentTrackIndex) div.classList.add("active-song");
          div.addEventListener("click", () => {
            currentTrackIndex = index;
            loadTrack(currentGenreIndex, currentTrackIndex);
          });
          songList.appendChild(div);
        });
      }

      function loadTrack(gIdx, tIdx, shouldPlay = true) {
        const genre = genreOrder[gIdx];
        const track = playlists[genre][tIdx];
        audio.src = track.src;
        albumArt.src = track.img;
        trackTitle.textContent = track.title;

        document.querySelectorAll(".genre-btn").forEach((btn) =>
          btn.classList.remove("active-genre")
        );
        document.getElementById(genre + "Btn").classList.add("active-genre");

        renderSongList();

        if (shouldPlay) {
          audio.play();
          playPauseBtn.textContent = "❚❚";
        }
      }

      function changePlaylist(name) {
        currentGenreIndex = genreOrder.indexOf(name);
        currentTrackIndex = 0;
        loadTrack(currentGenreIndex, currentTrackIndex);
      }

      playPauseBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play();
          playPauseBtn.textContent = "❚❚";
        } else {
          audio.pause();
          playPauseBtn.textContent = "▶︎";
        }
      });

      nextBtn.addEventListener("click", () => {
        currentTrackIndex++;
        if (currentTrackIndex >= playlists[genreOrder[currentGenreIndex]].length) {
          currentTrackIndex = 0;
          currentGenreIndex = (currentGenreIndex + 1) % genreOrder.length;
        }
        loadTrack(currentGenreIndex, currentTrackIndex);
      });

      prevBtn.addEventListener("click", () => {
        currentTrackIndex--;
        if (currentTrackIndex < 0) {
          currentGenreIndex = (currentGenreIndex - 1 + genreOrder.length) % genreOrder.length;
          currentTrackIndex = playlists[genreOrder[currentGenreIndex]].length - 1;
        }
        loadTrack(currentGenreIndex, currentTrackIndex);
      });

      // Volume slider input: nonlinear scaling for smoother control
      volumeSlider.addEventListener("input", () => {
        // Map slider 0-100 to a logarithmic volume curve
        const linearValue = volumeSlider.value / 100; // 0-1
        // logarithmic approximation (perceived volume)
        audio.volume = Math.pow(linearValue, 2); // squaring makes low values quieter, high values less harsh
        updateSliderBackground(volumeSlider);
      });

      // Progress bar update
      audio.addEventListener("timeupdate", () => {
        const percent = (audio.currentTime / audio.duration) * 100 || 0;
        progressBar.value = percent;
        updateSliderBackground(progressBar);

        const formatTime = (t) => `${Math.floor(t / 60)}:${Math.floor(t % 60).toString().padStart(2, "0")}`;
        timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration || 0)}`;
      });

      progressBar.addEventListener("input", () => {
        audio.currentTime = (progressBar.value / 100) * audio.duration;
        updateSliderBackground(progressBar);
      });

      function updateSliderBackground(slider) {
        const val = slider.value;
        slider.style.background = `linear-gradient(to right, #007bff 0%, #007bff ${val}%, #555 ${val}%, #555 100%)`;
      }

      audio.addEventListener("ended", () => {
        nextBtn.click();
      });

      loadTrack(currentGenreIndex, currentTrackIndex, false);
      updateSliderBackground(volumeSlider);
      updateSliderBackground(progressBar);
    </script>
  </body>
</html>
