    <style>
      .music-player {
        text-align: center;
        margin: 20px;
      }
      button {
        margin: 5px;
        padding: 10px;
        font-size: 16px;

  <body>
    <!-- All content goes here -->
    <div id="all-contents">
      <nav>
        <h1>
          Jeff's Amazing Website
        </h1>
        <ul id="nav-ul">
          <li class="nav-li">
            <a href="index.html">Home</a>
          </li>
          <li class="nav-li">
            <a href="portfolio.html">Portfolio</a>

          <li class ="nav-li">

          </li>
          <li class ="nav-li">
            <a href="music.html">Music</a>
          </li>
        </ul>
      </nav>
      <div class= "music-player">
        <h2> My Music Player </h2>
        <audio id="audioPlayer" src=""></audio> <!--Audio element, no built in controls-->
        <p id="trackTitle"> No track playing </p>
        <button id = "prevBtn"> Previous </button>
        <button id = "playPauseBtn"> Play </button>
        <button id = "nextBtn"> Next </button>
      </div>

    <script>
      const audio = document.getElementById('audioPlayer');
      const prevBtn = document.getElementById('prevBtn');
      const playPauseBtn = document.getElementById('playPauseBtn');
      const nextBtn = document.getElementById('nextBtn');
      const trackTitle = document.getElementById('trackTitle');

      const playlist = [
        {title: "Nevada", src: "mp3 files/Vicetone - Nevada (ft. Cozi Zuehlsdorff).mp3"},
        {title: "Shine", src: "/workspaces/jtb51.github.io/mp3 files/Spektrem - Shine Progressive House NCS - Copyright Free Music.mp3"}
      ];

      let currentTrack = 0;

      function loadTrack(index){
        audio.src = playlist[index].src;
        trackTitle.textContent = playlist[index].title;
        audio.play();
        playPauseBtn.textContent = 'Pause';
      }

      playPauseBtn.addEventListener('click', () => {
        if(audio.paused) {
          audio.play();
          playPauseBtn.textContent = 'Pause';
        } else {
          audio.pause();
          playPauseBtn.textContent = 'Play';
        }
      });

      nextBtn.addEventListener('click', () => {
        currentTrack = (currentTrack + 1) % playlist.length;
        loadTrack(currentTrack);
      });

      prevBtn.addEventListener('click', () => {
        currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
        loadTrack(currentTrack);
      });

      audio.addEventListener('ended', () => {
        nextBtn.click();
      });

      loadTrack(currentTrack);
    </script>
