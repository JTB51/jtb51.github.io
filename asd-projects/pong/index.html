<!DOCTYPE html>
<html>
  <head>
    <title> Pong Pon. Po.. P... .... </title>
    <!-- Load CSS files -->
    <link rel="stylesheet" type="text/css" href="index.css">
    <link rel="icon" type="image/x-icon" href="../../Images/can" />
    
    <!-- Load JavaScript files -->
    <script src="jquery.min.js"></script>
    <script src="index.js"></script>
  </head>
  
  <body>
    <p id = "pong-text"> RETRO PING PONG </p>
    <div id='board'>
      <div class = 'paddle' id='paddleLeft'></div>
      <div class = 'paddle' id='paddleRight'></div>
      <div id='ball'></div>
      <div id='score1'></div>
      <div id='score2'></div>
      <div id='divider'></div>
      <div class="score-container">
      <div class="score-left">
        <span class="score-label">Left</span>
        <span id="leftScore" class="score-value">0</span>
      </div>
      <div class="score-right">
        <span class="score-label">Right</span>
        <span id="rightScore" class="score-value">0</span>
      </div>
    </div>
  </body>
